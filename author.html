<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3B6EAA">
<title>저자 상세 · 씽크스마트</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"><div id="content"></div></div>
<script src="js/app.js"></script>
<script>
(async function() {
  const data = await loadData();
  const ig   = await loadInstagram();
  const ev   = await loadEvents();
  const id = qs('id', 'A001');
  const a = data.authors.find(x => x.id === id) || data.authors[0];
  const books = data.books.filter(b => b.authors.includes(a.id));
  const bookIds = books.map(b => b.id);
  const bookTitles = books.map(b => b.title);

  // 매칭 헬퍼 — 텍스트 안에 저자명·별칭·책 제목 포함 여부
  function nameMatches(text) {
    if (!text) return false;
    const t = String(text);
    if (t.includes(a.name)) return true;
    // 별칭(괄호 안팎)
    const m = a.name.match(/^(.+?)\s*\((.+?)\)\s*$/);
    if (m) {
      if (t.includes(m[1].trim()) || t.includes(m[2].trim())) return true;
    }
    return false;
  }
  function bookMatches(text) {
    if (!text) return false;
    const t = String(text);
    return bookTitles.some(title => title && title.length >= 4 && t.includes(title));
  }

  // ① events.json events에서 매칭 — host/title/summary
  const curatedEvents = (ev.events || []).filter(e =>
    nameMatches(e.host) || nameMatches(e.title) ||
    (e.related_book_id && bookIds.includes(e.related_book_id))
  );
  const curatedUpcoming = curatedEvents.filter(e => e.status === 'upcoming')
    .sort((a,b) => (a.date || '').localeCompare(b.date || ''));
  const curatedPast = curatedEvents.filter(e => e.status === 'past')
    .sort((a,b) => (b.date || '').localeCompare(a.date || ''));

  // ② instagram_picks에서 매칭 — title/summary
  const relatedPicks = (ev.instagram_picks || []).filter(p =>
    nameMatches(p.title) || nameMatches(p.summary) || bookMatches(p.title) || bookMatches(p.summary)
  );

  // ③ 함께한 행사 (인스타 백업 매칭)
  const igIds = a.ig_post_ids || [];
  const relatedPosts = igIds
    .map(pid => ig.posts.find(p => p.id === pid))
    .filter(Boolean);
  const eventPosts = relatedPosts.filter(p => p.types.includes('event'));
  const otherPosts = relatedPosts.filter(p => !p.types.includes('event'));

  // ④ 추천 행사 — 같은 마을학교 강사들의 다른 행사 + 같은 시리즈 동료 행사
  const myschools = new Set(a.schools || []);
  const mySeries = new Set(books.map(b => b.series).filter(Boolean)
    .map(s => s.replace(/\s*시리즈\s*\d+\s*$/, '').trim()));
  const peerAuthorIds = new Set();
  data.authors.forEach(other => {
    if (other.id === a.id) return;
    const shared = (other.schools || []).some(s => myschools.has(s));
    if (shared) peerAuthorIds.add(other.id);
  });
  data.books.forEach(b => {
    const bSeries = b.series ? b.series.replace(/\s*시리즈\s*\d+\s*$/, '').trim() : '';
    if (mySeries.has(bSeries)) {
      (b.authors || []).forEach(aid => { if (aid !== a.id) peerAuthorIds.add(aid); });
    }
  });
  const peerAuthors = data.authors.filter(x => peerAuthorIds.has(x.id));
  const peerNames = new Set(peerAuthors.map(x => x.name));
  const recommendedEvents = (ev.events || []).filter(e =>
    e.status === 'upcoming' &&
    !curatedEvents.includes(e) &&
    (peerNames.has(e.host) || (e.related_school && myschools.has(e.related_school)))
  ).slice(0, 3);

  document.getElementById('content').innerHTML = `
    ${backBar('저자')}
    <div class="author-hero">
      <div class="avatar" style="background:${avatarColor(a.name)};color:#fff;">
        ${initial(a.name)}
      </div>
      <h1>${a.name}</h1>
      <div class="meta">${a.reason}</div>
      <div class="sns">
        <a class="icon-pill" title="인스타그램 (등록 대기)">📷</a>
        <a class="icon-pill" title="블로그 (등록 대기)">📝</a>
        <a class="icon-pill" title="유튜브 (등록 대기)">▶️</a>
      </div>
    </div>

    <main>
      ${a.bio_one ? `
        <div class="card" style="margin-top:16px;text-align:center;">
          <p style="font-size:14px;line-height:1.6;">${a.bio_one}</p>
        </div>
      ` : `
        <div class="notice" style="margin-top:16px;">
          한 줄 소개·약력은 저자 본인 회신 후 채워질 예정입니다.
        </div>
      `}

      <section class="section" style="margin-top:22px;">
        <div class="section-title">
          <h2>집필 책 <span style="font-size:12px;color:var(--c-sub);font-weight:400;">${books.length}권</span></h2>
        </div>
        <div class="row-list">
          ${books.map(bookCard).join('')}
        </div>
      </section>

      ${a.schools.length ? `
        <section class="section">
          <div class="section-title">
            <h2>운영·참여 마을학교</h2>
          </div>
          <div class="h-scroll">
            ${a.schools.map(s => schoolCard(s, data.schools[s], data.school_descriptions[s])).join('')}
          </div>
          <p style="font-size:11px;color:var(--c-sub);margin-top:8px;">※ 시리즈 기반 1차 자동 매핑 — 실제 강의 이력은 운영팀 검수 후 확정</p>
        </section>
      ` : ''}

      ${curatedUpcoming.length ? `
        <section class="section">
          <div class="section-title">
            <h2>📌 다가오는 행사 (이 저자 출연)</h2>
            <span class="more">${curatedUpcoming.length}건</span>
          </div>
          <div class="row-list">
            ${curatedUpcoming.map(e => `
              <a class="event-card" href="event.html?id=${e.id}">
                <div class="event-cover" style="background:linear-gradient(135deg, #E07857 0%, #B5483B 100%);">
                  <div class="event-icon">${eventTypeIcon(e.type)}</div>
                  <div class="event-date-badge">
                    <div class="m">${new Date(e.date).getMonth()+1}</div>
                    <div class="d">${new Date(e.date).getDate()}</div>
                  </div>
                </div>
                <div class="event-body">
                  <div class="event-meta">
                    <span class="tag">${e.type}</span>
                    <span class="tag" style="background:#D4A574;color:#fff;">D-${daysUntil(e.date)}</span>
                  </div>
                  <div class="event-title">${e.title}</div>
                  <div class="event-sub">${fmtKoreanDate(e.date)} · ${e.location}</div>
                </div>
              </a>
            `).join('')}
          </div>
        </section>
      ` : ''}

      ${(curatedPast.length || relatedPicks.length) ? `
        <section class="section">
          <div class="section-title">
            <h2>📅 씽크스마트와 함께한 행사</h2>
            <span class="more">큐레이션 ${curatedPast.length}건 · 인스타 픽 ${relatedPicks.length}건</span>
          </div>
          ${curatedPast.length ? `
            <div class="row-list" style="margin-bottom:12px;">
              ${curatedPast.slice(0, 4).map(e => `
                <a class="event-card" href="event.html?id=${e.id}">
                  <div class="event-cover" style="background:linear-gradient(135deg, #5C97D4 0%, #3B6EAA 100%);">
                    <div class="event-icon">${eventTypeIcon(e.type)}</div>
                    <div class="event-date-badge">
                      <div class="m">${new Date(e.date).getMonth()+1}</div>
                      <div class="d">${new Date(e.date).getDate()}</div>
                    </div>
                  </div>
                  <div class="event-body">
                    <div class="event-meta"><span class="tag">${e.type}</span></div>
                    <div class="event-title">${e.title}</div>
                    <div class="event-sub">${fmtKoreanDate(e.date)} · ${e.location}</div>
                  </div>
                </a>
              `).join('')}
            </div>
          ` : ''}
          ${relatedPicks.length ? `
            <div class="h-scroll-wrap">
              <div class="h-scroll" style="padding-right:40px;">
                ${relatedPicks.map(instaPickCard).join('')}
              </div>
            </div>
          ` : ''}
        </section>
      ` : ''}

      ${eventPosts.length ? `
        <section class="section">
          <div class="section-title">
            <h2>📷 인스타 행사 기록 (자동 매칭)</h2>
            <span class="more">총 ${eventPosts.length}건</span>
          </div>
          <div class="row-list">
            ${eventPosts.slice(0, 6).map(igListCard).join('')}
          </div>
          ${eventPosts.length > 6 ? `
            <div style="text-align:center;margin-top:12px;">
              <a class="btn outline" href="instagram.html?filter=event">전체 인스타 행사 보기 →</a>
            </div>
          ` : ''}
        </section>
      ` : ''}

      ${recommendedEvents.length ? `
        <section class="section">
          <div class="section-title">
            <h2>🔗 추천 행사</h2>
            <span class="more">동료 저자·같은 학교</span>
          </div>
          <p style="font-size:11px;color:var(--c-sub);margin:-6px 0 10px;">
            같은 마을학교 강사 또는 같은 시리즈 동료의 다가오는 행사
          </p>
          <div class="row-list">
            ${recommendedEvents.map(e => `
              <a class="event-card" href="event.html?id=${e.id}">
                <div class="event-cover" style="background:linear-gradient(135deg, #D4A574 0%, #B5894A 100%);">
                  <div class="event-icon">${eventTypeIcon(e.type)}</div>
                  <div class="event-date-badge">
                    <div class="m">${new Date(e.date).getMonth()+1}</div>
                    <div class="d">${new Date(e.date).getDate()}</div>
                  </div>
                </div>
                <div class="event-body">
                  <div class="event-meta">
                    <span class="tag">${e.type}</span>
                    <span class="tag" style="background:#D4A574;color:#fff;">D-${daysUntil(e.date)}</span>
                  </div>
                  <div class="event-title">${e.title}</div>
                  <div class="event-sub">${fmtKoreanDate(e.date)} · ${e.host || ''}</div>
                </div>
              </a>
            `).join('')}
          </div>
        </section>
      ` : ''}

      ${otherPosts.length ? `
        <section class="section">
          <div class="section-title">
            <h2>📷 인스타에 언급된 글</h2>
            <span class="more">${otherPosts.length}건</span>
          </div>
          <div class="ig-grid">
            ${otherPosts.slice(0, 9).map(igCard).join('')}
          </div>
        </section>
      ` : ''}

      ${!relatedPosts.length ? `
        <section class="section">
          <div class="card">
            <h3 style="font-size:14px;font-weight:700;color:var(--c-primary);margin-bottom:10px;">씽크스마트와 함께한 활동</h3>
            <p style="font-size:13px;color:var(--c-sub);line-height:1.6;">
              인스타그램 백업에서 이 저자명을 찾지 못했습니다.<br>
              <span style="font-size:11px;">필명·약어·다른 이름으로 언급된 경우 매칭이 누락될 수 있습니다.</span>
            </p>
          </div>
        </section>
      ` : ''}

      <section class="section">
        <div class="card">
          <h3 style="font-size:14px;font-weight:700;color:var(--c-primary);margin-bottom:10px;">저자 코멘트 & 독자 후기</h3>
          <p style="font-size:13px;color:var(--c-sub);line-height:1.6;">
            저자가 직접 올린 글과 독자 후기 (Phase 3에서 추가 예정)
          </p>
        </div>
      </section>
    </main>
    ${nav('authors')}
  `;
})();
</script>
</body>
</html>
