<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3B6EAA">
<title>인스타그램 피드 · 씽크스마트</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"><div id="content"></div></div>
<script src="js/app.js"></script>
<script>
(async function() {
  const ig = await loadInstagram();
  const filter = qs('filter', 'all');
  const view = qs('view', 'grid');
  let posts = ig.posts;
  if (filter === 'event') posts = posts.filter(p => p.types.includes('event'));
  if (filter === 'book')  posts = posts.filter(p => p.types.includes('book'));

  const limit = 100;
  const shown = posts.slice(0, limit);

  document.getElementById('content').innerHTML = `
    ${headerTop()}
    <main>
      <h2 style="font-size:20px;font-weight:700;color:var(--c-primary);margin-bottom:4px;">
        📷 인스타그램 피드
      </h2>
      <p style="font-size:12px;color:var(--c-sub);margin-bottom:14px;">
        @${ig.meta.profile.split('/').filter(Boolean).pop()} · 총 ${ig.meta.total_posts}개 게시물
      </p>

      <div class="filter-bar">
        <a class="chip ${filter==='all'?'active':''}"   href="?filter=all">전체 (${ig.meta.total_posts})</a>
        <a class="chip ${filter==='event'?'active':''}" href="?filter=event">🎤 행사 (${ig.meta.event_posts})</a>
        <a class="chip ${filter==='book'?'active':''}"  href="?filter=book">📚 책 (${ig.meta.book_posts})</a>
      </div>

      <div class="filter-bar" style="margin-top:-6px;">
        <a class="chip ${view==='grid'?'active':''}" href="?filter=${filter}&view=grid">⊞ 그리드</a>
        <a class="chip ${view==='list'?'active':''}" href="?filter=${filter}&view=list">☰ 캡션 보기</a>
      </div>

      ${view === 'grid' ? `
        <div class="ig-grid">
          ${shown.map(igCard).join('')}
        </div>
      ` : `
        <div class="row-list">
          ${shown.map(igListCard).join('')}
        </div>
      `}

      <p style="font-size:11px;color:var(--c-sub);text-align:center;margin-top:18px;">
        ${shown.length} / ${posts.length}개 표시 중 · 최신순
      </p>

      <div class="notice" style="margin-top:14px;">
        인스타그램 백업 파일에서 자동 가져옴 (${ig.meta.updated}).<br>
        새 게시물 반영하려면 백업 파일을 다시 업로드하시면 됩니다.
      </div>
    </main>
    ${nav('events')}
  `;
})();
</script>
</body>
</html>
