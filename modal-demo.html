<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3B6EAA">
<title>모달 데모</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="content">
    <div style="padding:30px;text-align:center;">
      <h2 style="color:var(--c-primary);">모달 데모용 페이지</h2>
      <p style="color:var(--c-sub);font-size:13px;margin-top:8px;">자동으로 신청 모달이 열립니다.</p>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
  // 페이지 로드 후 모달 자동 오픈 (스크린샷용)
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      document.getElementById('reg-event-id').value = 'demo-001';
      document.getElementById('reg-event-name').value = '[예시] 김무영 작가 북토크 — 인문학은 행복한 놀이다';
      document.getElementById('reg-event-title').textContent = '[예시] 김무영 작가 북토크 — 인문학은 행복한 놀이다';
      document.getElementById('reg-event-sub').textContent = '6월 15일 (월) 19:00 · 고양 씽크스마트 북카페';
      document.body.classList.add('reg-open');
    }, 100);
  });
</script>
</body>
</html>
