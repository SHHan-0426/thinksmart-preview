<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3B6EAA">
<title>행사 · 씽크스마트</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app"><div id="content"></div></div>
<script src="js/app.js"></script>
<script>
(async function() {
  const ev = await loadEvents();
  const ig = await loadInstagram();
  const tab = qs('tab', 'upcoming');

  function classifyEventType(caption) {
    const c = caption || '';
    if (/북토크|북콘서트/.test(c)) return '북토크';
    if (/출간\s*기념|출간기념|신간\s*출간/.test(c)) return '출간기념';
    if (/모집|개강|신청|기수/.test(c)) return '마을학교 모집';
    if (/수료|수료식|종강/.test(c)) return '수료식';
    if (/살롱/.test(c)) return '살롱';
    if (/강연|강좌|특강|세미나/.test(c)) return '강연';
    if (/워크숍|워크샵/.test(c)) return '워크숍';
    if (/낭독|낭독학교/.test(c)) return '낭독';
    if (/현장|후기/.test(c)) return '현장 스케치';
    return '기타';
  }

  const view = qs('cal', '');   // '' = 리스트, 'month' = 캘린더
  const upcoming = ev.events
    .filter(e => e.status === 'upcoming')
    .sort((a,b) => (a.date || '').localeCompare(b.date || ''));
  const pastCurated = ev.events
    .filter(e => e.status === 'past')
    .sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  const pastIg = ig.posts
    .filter(p => p.types.includes('event'))
    .map(p => ({ ...p, event_type: classifyEventType(p.caption) }));

  // 유형별 그룹
  function renderByGroup() {
    return pickOnePerGroup(pastIg, p => p.event_type)
      .map(g => `
        <a class="event-type-card" href="ig-post.html?id=${g.pick.id}">
          ${g.pick.images[0] ? `<div class="evt-thumb" style="background-image:url('${thumb(g.pick.images[0])}');"></div>` : '<div class="evt-thumb"></div>'}
          <div class="evt-body">
            <div class="evt-type">${g.group} <span class="evt-count">· ${g.count}건</span></div>
            <div class="evt-caption">${shortCaption(g.pick.caption, 80)}</div>
            <div class="evt-date">${g.pick.date_display}</div>
          </div>
        </a>
      `).join('');
  }

  function renderAllChronological() {
    return pastIg
      .sort((a,b) => (b.date||'').localeCompare(a.date||''))
      .slice(0, 60)
      .map(igListCard).join('');
  }

  // ── 캘린더 렌더링 (월별 그리드) ──
  function renderCalendar(year, month) {
    // month: 0~11
    const allEvents = [...ev.events, ...pastIg.map(p => ({
      id: p.id, title: shortCaption(p.caption, 30),
      date: (p.date || '').slice(0, 10), type: p.event_type,
      _isIg: true,
    }))];
    const byDay = {};
    allEvents.forEach(e => {
      if (!e.date) return;
      const d = new Date(e.date);
      if (d.getFullYear() !== year || d.getMonth() !== month) return;
      const day = d.getDate();
      (byDay[day] = byDay[day] || []).push(e);
    });

    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);
    const startDow = first.getDay();
    const daysInMonth = last.getDate();

    const today = new Date();
    const isCurMonth = today.getFullYear() === year && today.getMonth() === month;
    const todayDate = today.getDate();

    let cells = [];
    for (let i = 0; i < startDow; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    const monthLabel = `${year}년 ${month + 1}월`;
    const prev = month === 0 ? { y: year - 1, m: 11 } : { y: year, m: month - 1 };
    const next = month === 11 ? { y: year + 1, m: 0 } : { y: year, m: month + 1 };

    return `
      <div class="cal-header">
        <a class="cal-nav" href="?cal=month&y=${prev.y}&m=${prev.m}">‹</a>
        <div class="cal-month">${monthLabel}</div>
        <a class="cal-nav" href="?cal=month&y=${next.y}&m=${next.m}">›</a>
      </div>
      <div class="cal-grid">
        ${['일','월','화','수','목','금','토'].map((w, i) => `
          <div class="cal-dow" style="color:${i===0?'#E07857':i===6?'#5C97D4':'var(--c-sub)'};">${w}</div>
        `).join('')}
        ${cells.map(d => {
          if (d === null) return '<div class="cal-cell empty"></div>';
          const dayEvents = byDay[d] || [];
          const isToday = isCurMonth && d === todayDate;
          return `
            <div class="cal-cell ${dayEvents.length ? 'has-event' : ''} ${isToday ? 'today' : ''}">
              <div class="cal-day">${d}</div>
              ${dayEvents.slice(0,2).map(e => `
                <a class="cal-pill" href="${e._isIg ? `ig-post.html?id=${e.id}` : `event.html?id=${e.id}`}"
                   style="background:${e._isIg ? '#A37A5B' : '#3B6EAA'};"
                   title="${e.title}">${shortCaption(e.title, 8)}</a>
              `).join('')}
              ${dayEvents.length > 2 ? `<div class="cal-more">+${dayEvents.length - 2}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      <p style="font-size:11px;color:var(--c-sub);margin-top:10px;text-align:center;">
        파란색: 큐레이션 행사 · 갈색: 인스타 행사 기록
      </p>
    `;
  }

  let body = '';

  if (view === 'month') {
    const y = parseInt(qs('y', new Date().getFullYear()));
    const m = parseInt(qs('m', new Date().getMonth()));
    body = renderCalendar(y, m);
  } else if (tab === 'upcoming') {
    body = upcoming.length ? `
      <div class="row-list">
        ${upcoming.map(e => `
          <a class="event-card" href="event.html?id=${e.id}">
            <div class="event-cover" style="background:linear-gradient(135deg, #5C97D4 0%, #3B6EAA 100%);">
              <div class="event-icon">${eventTypeIcon(e.type)}</div>
              <div class="event-date-badge">
                <div class="m">${new Date(e.date).getMonth()+1}</div>
                <div class="d">${new Date(e.date).getDate()}</div>
              </div>
            </div>
            <div class="event-body">
              <div class="event-meta">
                <span class="tag">${e.type}</span>
                <span class="tag" style="background:#D4A574;color:#fff;">D-${daysUntil(e.date)}</span>
              </div>
              <div class="event-title">${e.title}</div>
              <div class="event-sub">${fmtKoreanDate(e.date)}${e.time ? ' · '+e.time : ''} · ${e.location}</div>
              ${e.host ? `<div class="event-host">진행: ${e.host}</div>` : ''}
              <div class="btn-row" style="margin-top:10px;">
                <button class="btn amber" type="button"
                        data-event-register
                        data-event-id="${e.id}"
                        data-event-name="${e.title}"
                        data-event-date="${fmtKoreanDate(e.date)}${e.time ? ' ' + e.time : ''}"
                        data-event-loc="${e.location}"
                        style="font-size:12px;padding:10px 0;">참가 신청</button>
              </div>
            </div>
          </a>
        `).join('')}
      </div>
    ` : `
      <div class="empty">
        <div class="icon">📭</div>
        예정된 행사가 없습니다.
      </div>
    `;
  } else {
    const subview = qs('view', 'group');
    body = `
      <div class="filter-bar">
        <a class="chip ${subview==='group'?'active':''}" href="?tab=past&view=group">유형별 한 건</a>
        <a class="chip ${subview==='all'?'active':''}"   href="?tab=past&view=all">최신순 전체</a>
      </div>
      ${subview === 'group' ? `
        ${pastCurated.length ? `
          <h3 class="subhead">큐레이션된 지난 행사</h3>
          <div class="row-list" style="margin-bottom:20px;">
            ${pastCurated.map(e => `
              <a class="event-card" href="event.html?id=${e.id}">
                <div class="event-cover" style="background:linear-gradient(135deg, #5C97D4 0%, #3B6EAA 100%);">
                  <div class="event-icon">${eventTypeIcon(e.type)}</div>
                  <div class="event-date-badge">
                    <div class="m">${new Date(e.date).getMonth()+1}</div>
                    <div class="d">${new Date(e.date).getDate()}</div>
                  </div>
                </div>
                <div class="event-body">
                  <div class="event-meta"><span class="tag">${e.type}</span></div>
                  <div class="event-title">${e.title}</div>
                  <div class="event-sub">${fmtKoreanDate(e.date)} · ${e.location}</div>
                </div>
              </a>
            `).join('')}
          </div>
        ` : ''}
        <div class="section-title">
          <h3 class="subhead">📷 인스타 행사 — 유형별 한 건 (${ig.meta.event_posts}건 자동 분류)</h3>
          <button class="shuffle-btn" data-shuffle="events-page" aria-label="셔플">🔀</button>
        </div>
        <div class="row-list" id="events-page-shuffle">${renderByGroup()}</div>
      ` : `
        <h3 class="subhead">📷 인스타 행사 전체 최신순 (Top 60)</h3>
        <div class="row-list">${renderAllChronological()}</div>
      `}
    `;
  }

  document.getElementById('content').innerHTML = `
    ${headerTop()}
    <main>
      <h2 style="font-size:20px;font-weight:700;color:var(--c-primary);margin-bottom:4px;">
        행사 · 모임
      </h2>
      <p style="font-size:12px;color:var(--c-sub);margin-bottom:16px;">
        북토크 · 출간 기념 · 마을학교 모집 · 살롱 · 수료식
      </p>

      <div class="filter-bar" style="margin-bottom:8px;">
        <a class="chip ${view!=='month'?'active':''}" href="?tab=${tab}">📋 리스트</a>
        <a class="chip ${view==='month'?'active':''}" href="?cal=month">📅 캘린더</a>
      </div>

      ${view !== 'month' ? `
        <div class="tab-toggle">
          <a class="t ${tab==='upcoming'?'active':''}" href="?tab=upcoming">
            다가오는 (${upcoming.length})
          </a>
          <a class="t ${tab==='past'?'active':''}" href="?tab=past&view=group">
            지난 (${pastCurated.length + pastIg.length})
          </a>
        </div>
      ` : ''}

      ${body}

      <div class="notice" style="margin-top:22px;">
        <strong>📷 인스타그램 연동 (${ig.meta.updated} 기준)</strong><br>
        @${ig.meta.profile.split('/').filter(Boolean).pop()}에서 ${ig.meta.total_posts}개 게시물 자동 가져옴 · ${ig.meta.event_posts}건 행사 분류
      </div>
    </main>
    ${nav('events')}
  `;

  // 셔플 버튼
  document.addEventListener('click', e => {
    const sb = e.target.closest('[data-shuffle="events-page"]');
    if (sb) {
      const el = document.getElementById('events-page-shuffle');
      if (el) el.innerHTML = renderByGroup();
    }
  });
})();
</script>
</body>
</html>
