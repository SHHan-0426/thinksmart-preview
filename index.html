<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1F3A5F">
<title>씽크스마트 — 사람이 책이 된다</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="content"></div>
</div>
<script src="js/app.js"></script>
<script>
(async function() {
  const data = await loadData();
  const ev = await loadEvents();
  const ig = await loadInstagram();
  const aAuthors = data.authors.filter(a => a.grade === 'A');
  const today = new Date().getDate();
  const heroAuthor = aAuthors[today % aAuthors.length];

  const recentBooks = [...data.books]
    .sort((a,b) => (b.pub_date || '').localeCompare(a.pub_date || ''))
    .slice(0, 4);

  const upcomingEvents = ev.events
    .filter(e => e.status === 'upcoming')
    .sort((a,b) => (a.date || '').localeCompare(b.date || ''))
    .slice(0, 3);

  // 지난 행사: 인스타 행사 게시물 최신순
  const recentEventIgPosts = ig.posts
    .filter(p => p.types.includes('event'))
    .slice(0, 6);

  // 최근 인스타 (전체 최신)
  const recentIgPosts = ig.posts.slice(0, 9);

  const schoolsOrder = ['낭독학교','사춘기살롱','서각학교','남독학교','썰래발학교'];

  document.getElementById('content').innerHTML = `
    ${headerTop()}
    <main>
      <div class="notice">
        <strong>⚠️ 배포 전 미리보기 v0.1</strong> — 저자 사진·책 표지·소개문은 자동 매핑된 데이터로 채워졌습니다. 김태영 대표 검수 후 알라딘 API 보강 → 확정 배포 예정.
      </div>

      <a class="hero" href="author.html?id=${heroAuthor.id}">
        <div class="avatar" style="background:${avatarColor(heroAuthor.name)};color:#fff;">
          ${initial(heroAuthor.name)}
        </div>
        <h1>${heroAuthor.name}</h1>
        <p class="lead">${heroAuthor.reason}</p>
        <div class="meta">
          대표작 <strong>『${heroAuthor.lead}』</strong>
        </div>
      </a>

      ${upcomingEvents.length ? `
        <section class="section">
          <div class="section-title">
            <h2>🎤 다가오는 행사</h2>
            <a class="more" href="events.html?tab=upcoming">전체 ${upcomingEvents.length}개 →</a>
          </div>
          <div class="h-scroll event-h-scroll">
            ${upcomingEvents.map(eventCard).join('')}
          </div>
        </section>
      ` : ''}

      <section class="section">
        <div class="section-title">
          <h2>이번 주 신간</h2>
          <a class="more" href="books.html">전체 →</a>
        </div>
        <div class="row-list">
          ${recentBooks.map(bookCard).join('')}
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <h2>천개의 마을학교</h2>
          <a class="more" href="schools.html">전체 →</a>
        </div>
        <div class="h-scroll">
          ${schoolsOrder.map(name => schoolCard(name, data.schools[name], data.school_descriptions[name])).join('')}
        </div>
      </section>

      ${recentEventIgPosts.length ? `
        <section class="section">
          <div class="section-title">
            <h2>📷 최근 다녀간 행사</h2>
            <a class="more" href="instagram.html?filter=event">전체 ${ig.meta.event_posts}건 →</a>
          </div>
          <div class="row-list">
            ${recentEventIgPosts.slice(0, 4).map(igListCard).join('')}
          </div>
        </section>
      ` : ''}

      <section class="section">
        <div class="section-title">
          <h2>📷 인스타그램</h2>
          <a class="more" href="instagram.html">전체 ${ig.meta.total_posts}개 →</a>
        </div>
        <div class="ig-grid">
          ${recentIgPosts.map(igCard).join('')}
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <h2>주목할 저자</h2>
          <a class="more" href="authors.html">전체 →</a>
        </div>
        <div class="author-grid">
          ${aAuthors.slice(0, 6).map(authorCard).join('')}
        </div>
      </section>
    </main>
    ${nav('home')}
  `;
})();
</script>
</body>
</html>
