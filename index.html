<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3B6EAA">
<title>씽크스마트 — 사람이 책이 된다</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="content"></div>
</div>

<!-- Netlify Forms 빌드 감지용 hidden 폼 (필수, 화면에 안 보임) -->
<form name="event-registration" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="event_id">
  <input type="text" name="event_name">
  <input type="text" name="name">
  <input type="tel" name="phone">
  <input type="text" name="attendees">
  <textarea name="message"></textarea>
  <input type="checkbox" name="agree">
  <input type="text" name="bot-field">
</form>

<script src="js/app.js"></script>
<script>
(async function() {
  const data = await loadData();
  const ev   = await loadEvents();
  const ig   = await loadInstagram();

  // ── ① 저자: 인스타에 등장한 적 있는 저자 우선, 셔플로 3명
  const authorsWithIg = data.authors.filter(a => (a.ig_post_ids||[]).length > 0);
  const authorsPool = authorsWithIg.length >= 3 ? authorsWithIg : data.authors.filter(a => a.count >= 2);
  const authorsAlphabetical = [...data.authors].sort((a,b) => a.name.localeCompare(b.name, 'ko'));

  // ── ② 행사
  const upcomingEvents = ev.events
    .filter(e => e.status === 'upcoming')
    .sort((a,b) => (a.date || '').localeCompare(b.date || ''));

  // 인스타 픽 (운영자 직접 임베드)
  const instaPicks = ev.instagram_picks || [];

  // 지난 행사 = 인스타 행사 게시물을 유형별로 분류
  function classifyEventType(caption) {
    const c = caption || '';
    if (/북토크|북콘서트/.test(c)) return '북토크';
    if (/출간\s*기념|출간기념|신간\s*출간/.test(c)) return '출간기념';
    if (/모집|개강|신청|기수/.test(c)) return '마을학교 모집';
    if (/수료|수료식|종강/.test(c)) return '수료식';
    if (/살롱/.test(c)) return '살롱';
    if (/강연|강좌|특강|세미나/.test(c)) return '강연';
    if (/워크숍|워크샵/.test(c)) return '워크숍';
    if (/낭독|낭독학교/.test(c)) return '낭독';
    if (/현장|후기/.test(c)) return '현장 스케치';
    return '기타';
  }
  const pastEventPosts = ig.posts.filter(p => p.types.includes('event'));
  pastEventPosts.forEach(p => { p.event_type = classifyEventType(p.caption); });

  // ── ③ 책방
  const recentBooks = [...data.books]
    .sort((a,b) => (b.pub_date || '').localeCompare(a.pub_date || ''))
    .slice(0, 4);

  // ── ④ 마을학교
  const schoolsOrder = ['낭독학교','사춘기살롱','서각학교','남독학교','썰래발학교'];

  // ── 렌더링
  document.getElementById('content').innerHTML = `
    ${headerTop()}
    <main>
      <div class="notice">
        <strong>⚠️ 시험판 v0.7</strong> — 저자 사진·책 표지는 추후 회수, 인스타 백업 ${ig.meta.total_posts}건 + 최근 픽 ${instaPicks.length}건 통합.
      </div>

      ${(function() {
        // 오늘 이후 가장 가까운 행사 + D-14 이내면 강조 띠
        const future = upcomingEvents.filter(e => {
          const d = daysUntil(e.date);
          return d !== null && d >= 0;
        });
        const next = future[0];
        if (!next) return '';
        const dleft = daysUntil(next.date);
        if (dleft === null || dleft > 14) return '';
        const urgent = dleft <= 7;
        return `
          <a class="dday-banner ${urgent ? 'urgent' : ''}" href="event.html?id=${next.id}">
            <div class="dday-badge">${dleft <= 0 ? '오늘' : 'D-' + dleft}</div>
            <div class="dday-body">
              <div class="dday-title">${next.title}</div>
              <div class="dday-meta">${fmtKoreanDate(next.date)}${next.time ? ' · ' + next.time : ''} · ${next.location}</div>
            </div>
            <div class="dday-arrow">›</div>
          </a>
        `;
      })()}

      ${instaPicks.length ? `
        <!-- ⭐ 최근 인스타 픽 (운영자 큐레이션) -->
        <section class="section">
          <div class="section-title">
            <h2>📷 최근 인스타 픽</h2>
            <span class="more">${instaPicks.length}건 · 운영자 픽</span>
          </div>
          <div class="h-scroll-wrap">
            <div class="h-scroll" style="padding-right:40px;">
              ${instaPicks.map(instaPickCard).join('')}
            </div>
          </div>
        </section>
      ` : ''}

      <!-- ① 저자 -->
      <section class="section">
        <div class="section-title">
          <h2>저자</h2>
          <div class="title-actions">
            <button class="shuffle-btn" data-shuffle="authors" aria-label="셔플">🔀</button>
            <button class="more more-toggle" data-toggle="authors-all">전체 가나다순 ▾</button>
          </div>
        </div>

        <div class="author-name-grid" id="authors-shuffle">
          ${shuffle(authorsPool).slice(0,3).map(authorNameCard).join('')}
        </div>

        <div class="author-alphabetical" id="authors-all" style="display:none;">
          ${authorsAlphabetical.map(a => `
            <a class="alpha-item" href="author.html?id=${a.id}">
              <span class="alpha-name">${a.name}</span>
              <span class="alpha-meta">${a.count}권${a.schools.length ? ' · ' + a.schools[0] : ''}</span>
            </a>
          `).join('')}
        </div>
      </section>

      <!-- ② 행사 -->
      <section class="section">
        <div class="section-title">
          <h2>행사</h2>
          <div class="title-actions">
            <button class="shuffle-btn" data-shuffle="events" aria-label="셔플">🔀</button>
            <a class="more" href="events.html?tab=past">전체 최근순 →</a>
          </div>
        </div>

        ${upcomingEvents.length ? `
          <h3 class="subhead">📌 다가오는 행사 (${upcomingEvents.length})</h3>
          <div class="row-list" style="margin-bottom:18px;">
            ${upcomingEvents.slice(0,3).map(e => `
              <a class="event-card" href="event.html?id=${e.id}">
                <div class="event-cover" style="background:linear-gradient(135deg, #5C97D4 0%, #3B6EAA 100%);">
                  <div class="event-icon">${eventTypeIcon(e.type)}</div>
                  <div class="event-date-badge">
                    <div class="m">${new Date(e.date).getMonth()+1}</div>
                    <div class="d">${new Date(e.date).getDate()}</div>
                  </div>
                </div>
                <div class="event-body">
                  <div class="event-meta">
                    <span class="tag">${e.type}</span>
                    <span class="tag" style="background:#D4A574;color:#fff;">D-${daysUntil(e.date)}</span>
                  </div>
                  <div class="event-title">${e.title}</div>
                  <div class="event-sub">${fmtKoreanDate(e.date)}${e.time ? ' · '+e.time : ''} · ${e.location}</div>
                  <div class="btn-row" style="margin-top:10px;">
                    <button class="btn amber" type="button"
                            data-event-register
                            data-event-id="${e.id}"
                            data-event-name="${e.title}"
                            data-event-date="${fmtKoreanDate(e.date)}${e.time ? ' ' + e.time : ''}"
                            data-event-loc="${e.location}"
                            style="font-size:12px;padding:9px 0;">참가 신청</button>
                  </div>
                </div>
              </a>
            `).join('')}
          </div>
        ` : ''}

        <h3 class="subhead">📅 지난 행사 — 유형별 한 건씩</h3>
        <div class="row-list" id="events-shuffle">
          ${pickOnePerGroup(pastEventPosts, p => p.event_type).slice(0, 6).map(g => `
            <a class="event-type-card" href="ig-post.html?id=${g.pick.id}">
              ${g.pick.images[0] ? `<div class="evt-thumb" style="background-image:url('${thumb(g.pick.images[0])}');"></div>` : '<div class="evt-thumb"></div>'}
              <div class="evt-body">
                <div class="evt-type">${g.group} <span class="evt-count">· ${g.count}건</span></div>
                <div class="evt-caption">${shortCaption(g.pick.caption, 70)}</div>
                <div class="evt-date">${g.pick.date_display}</div>
              </div>
            </a>
          `).join('')}
        </div>
      </section>

      <!-- ③ 책방 -->
      <section class="section">
        <div class="section-title">
          <h2>씽크스마트 책방 산책</h2>
          <div class="title-actions">
            <button class="shuffle-btn" data-shuffle="books" aria-label="셔플">🔀</button>
            <a class="more" href="books.html">전체 최신순 →</a>
          </div>
        </div>

        <h3 class="subhead">📚 이번 주 신간 (4권)</h3>
        <div class="row-list" style="margin-bottom:18px;">
          ${recentBooks.map(bookCard).join('')}
        </div>

        <h3 class="subhead">📖 분야별 한 권씩</h3>
        <div class="row-list" id="books-shuffle">
          ${pickOnePerGroup(data.books, b => b.category).slice(0, 8).map(g => `
            <a class="cat-book-card" href="book.html?id=${g.pick.id}">
              <div class="cat-tag">${g.group} <span style="color:var(--c-sub);font-weight:400;">· ${g.count}권</span></div>
              <div class="cat-book-row">
                ${bookCover(g.pick.title, g.pick.series)}
                <div class="cat-book-info">
                  <div class="cat-book-title">${g.pick.title}</div>
                  ${g.pick.subtitle ? `<div class="cat-book-sub">${g.pick.subtitle}</div>` : ''}
                  <div class="cat-book-meta">${g.pick.author_names.slice(0,2).join(', ')} · ${(g.pick.pub_date||'').slice(0,7)}</div>
                </div>
              </div>
            </a>
          `).join('')}
        </div>
      </section>

      <!-- ④ 천개의 마을학교 (별도) -->
      <section class="section schools-section">
        <div class="section-title">
          <h2>천개의 마을학교</h2>
          <a class="more" href="schools.html">전체 →</a>
        </div>
        <p style="font-size:12px;color:var(--c-sub);margin:-6px 0 12px;">책 밖으로 걸어 나온 5개의 학교</p>
        <div class="h-scroll-wrap">
          <div class="h-scroll">
            ${schoolsOrder.map(name => schoolCard(name, data.schools[name], data.school_descriptions[name])).join('')}
          </div>
        </div>
      </section>
    </main>
    ${nav('home')}
  `;

  // ── 인터랙션: 셔플 / 전체 보기 토글
  document.addEventListener('click', e => {
    const sb = e.target.closest('[data-shuffle]');
    if (sb) {
      const which = sb.dataset.shuffle;
      if (which === 'authors') {
        document.getElementById('authors-shuffle').innerHTML =
          shuffle(authorsPool).slice(0,3).map(authorNameCard).join('');
      } else if (which === 'events') {
        document.getElementById('events-shuffle').innerHTML =
          pickOnePerGroup(pastEventPosts, p => p.event_type).slice(0, 6).map(g => `
            <a class="event-type-card" href="ig-post.html?id=${g.pick.id}">
              ${g.pick.images[0] ? `<div class="evt-thumb" style="background-image:url('${thumb(g.pick.images[0])}');"></div>` : '<div class="evt-thumb"></div>'}
              <div class="evt-body">
                <div class="evt-type">${g.group} <span class="evt-count">· ${g.count}건</span></div>
                <div class="evt-caption">${shortCaption(g.pick.caption, 70)}</div>
                <div class="evt-date">${g.pick.date_display}</div>
              </div>
            </a>
          `).join('');
      } else if (which === 'books') {
        document.getElementById('books-shuffle').innerHTML =
          pickOnePerGroup(data.books, b => b.category).slice(0, 8).map(g => `
            <a class="cat-book-card" href="book.html?id=${g.pick.id}">
              <div class="cat-tag">${g.group} <span style="color:var(--c-sub);font-weight:400;">· ${g.count}권</span></div>
              <div class="cat-book-row">
                ${bookCover(g.pick.title, g.pick.series)}
                <div class="cat-book-info">
                  <div class="cat-book-title">${g.pick.title}</div>
                  ${g.pick.subtitle ? `<div class="cat-book-sub">${g.pick.subtitle}</div>` : ''}
                  <div class="cat-book-meta">${g.pick.author_names.slice(0,2).join(', ')} · ${(g.pick.pub_date||'').slice(0,7)}</div>
                </div>
              </div>
            </a>
          `).join('');
      }
    }
    const tg = e.target.closest('[data-toggle]');
    if (tg) {
      const target = document.getElementById(tg.dataset.toggle);
      if (target) {
        const showing = target.style.display !== 'none';
        target.style.display = showing ? 'none' : 'block';
        tg.textContent = showing ? '전체 가나다순 ▾' : '전체 가나다순 ▴';
      }
    }
  });
})();
</script>
</body>
</html>
